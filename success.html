<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Success</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5fbff;
      color: #102347;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #dbe5f2;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      width: min(420px, 100%);
      text-align: center;
    }
    h1 {
      margin: 0 0 0.4rem;
      font-size: 1.2rem;
    }
    p {
      margin: 0;
      color: #4f5f80;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment Successful</h1>
    <p>Redirecting to home page...</p>
  </div>

  <script>
    const BOOKINGS_KEY = "bluemoon_bookings";
    const PENDING_BOOKING_KEY = "bluemoon_pending_booking";

    const pendingRaw = localStorage.getItem(PENDING_BOOKING_KEY);
    if (pendingRaw) {
      try {
        const pending = JSON.parse(pendingRaw);
        const bookingsRaw = localStorage.getItem(BOOKINGS_KEY);
        const bookings = bookingsRaw ? JSON.parse(bookingsRaw) : [];
        bookings.push({
          ...pending,
          status: "PAID",
          paidAt: new Date().toISOString()
        });
        localStorage.setItem(BOOKINGS_KEY, JSON.stringify(bookings));
        localStorage.removeItem(PENDING_BOOKING_KEY);
      } catch (error) {
        // Ignore bad data and continue redirect.
      }
    }

    setTimeout(() => {
      window.location.href = "index.html?payment=success";
    }, 900);
  </script>
</body>
</html>
